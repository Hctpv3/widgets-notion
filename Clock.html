<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Notion Widget · Elegant Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo completamente transparente para que se integre en Notion 
           (el widget flota sobre el fondo de la página) */
        body {
            background: transparent;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        /* Tarjeta principal: estilo vidrio mate, elegante, compatible con fondos claros/oscuros de Notion */
        .clock-widget {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.02);
            padding: 1.8rem 1.5rem 1.8rem 1.5rem;
            width: 100%;
            max-width: 420px;
            transition: all 0.2s ease;
            text-align: center;
        }

        /* modo oscuro automático: si la página de Notion tiene fondo oscuro, la tarjeta se adapta sutilmente */
        @media (prefers-color-scheme: dark) {
            .clock-widget {
                background: rgba(30, 30, 35, 0.92);
                box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            }
            .digital-time, .date-text, .toggle-format {
                color: #f0f0f0;
            }
            .toggle-format {
                background: rgba(255, 255, 255, 0.12);
            }
        }

        /* Contenedor del canvas (reloj análogo) */
        .analog-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.25rem;
        }

        canvas {
            width: 100%;
            max-width: 220px;
            height: auto;
            background: #fefefe;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08), inset 0 0 0 1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        @media (prefers-color-scheme: dark) {
            canvas {
                background: #1e1e24;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            }
        }

        /* Reloj digital grande */
        .digital-time {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            font-family: 'Inter', 'JetBrains Mono', monospace;
            color: #1f2a3e;
            background: rgba(0, 0, 0, 0.02);
            padding: 0.25rem 0.5rem;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 0.6rem;
            transition: color 0.2s;
        }

        /* Fecha */
        .date-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: #4a5568;
            letter-spacing: 0.3px;
            background: rgba(0, 0, 0, 0.02);
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        /* Botón / toggle para cambiar formato 12h/24h */
        .toggle-format {
            background: rgba(0, 0, 0, 0.06);
            border: none;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            color: #2d3748;
            font-family: inherit;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-format:hover {
            background: rgba(0, 0, 0, 0.12);
            transform: scale(0.97);
        }

        .toggle-format:active {
            transform: scale(0.95);
        }

        /* footer sutil (opcional) */
        .widget-footer {
            margin-top: 1rem;
            font-size: 0.7rem;
            opacity: 0.5;
            color: #6c757d;
            letter-spacing: 0.3px;
        }

        @media (prefers-color-scheme: dark) {
            .widget-footer {
                color: #aaa;
            }
            .digital-time {
                color: #f0f3fa;
            }
            .date-text {
                color: #cbd5e0;
            }
        }

        /* Ajustes para móviles */
        @media (max-width: 450px) {
            .clock-widget {
                padding: 1.3rem 1rem;
            }
            .digital-time {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
<div class="clock-widget">
    <!-- Reloj analógico (canvas) -->
    <div class="analog-container">
        <canvas id="analogCanvas" width="220" height="220" style="width:100%; height:auto; max-width:220px; aspect-ratio:1/1">
            Tu navegador no soporta canvas.
        </canvas>
    </div>

    <!-- Reloj digital + fecha + selector de formato -->
    <div class="digital-time" id="digitalClock">--:--:--</div>
    <div class="date-text" id="dateDisplay"></div>
    <div>
        <button class="toggle-format" id="toggleFormatBtn">🕒 12h / 24h</button>
    </div>
    <div class="widget-footer">⏱️ widget · tiempo real</div>
</div>

<script>
    (function() {
        // -------- ELEMENTOS DOM ----------
        const canvas = document.getElementById('analogCanvas');
        const ctx = canvas.getContext('2d');
        const digitalElement = document.getElementById('digitalClock');
        const dateElement = document.getElementById('dateDisplay');
        const toggleBtn = document.getElementById('toggleFormatBtn');

        // -------- CONFIGURACIÓN DEL RELOJ ----------
        let use24Hour = false;    // false = 12h con AM/PM | true = 24h
        let animationFrameId = null;
        let intervalId = null;

        // Dimensiones del canvas (fijas: 220x220)
        const size = 220;
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = 98;        // radio del círculo del reloj (márgenes elegantes)

        // -------- FUNCIÓN PARA DIBUJAR EL RELOJ ANÁLOGO (basado en fecha actual) ----------
        function drawAnalogClock() {
            if (!ctx) return;
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // Normalizar horas para el reloj analógico (formato 12h para la esfera)
            const hourForHand = hours % 12;
            // Ángulos: 0 grados = las 12 (arriba), conversión a radianes
            // Hora: 360° / 12 = 30° por hora, más ajuste por minutos
            const hourAngle = ((hourForHand + minutes / 60) * 30) * Math.PI / 180;
            // Minutos: 360° / 60 = 6° por minuto
            const minuteAngle = (minutes * 6) * Math.PI / 180;
            // Segundos: 6° por segundo
            const secondAngle = (seconds * 6) * Math.PI / 180;

            // Limpiar canvas
            ctx.clearRect(0, 0, size, size);

            // ----- Fondo del reloj (para modo claro/oscuro se adapta por CSS pero el canvas necesita su propio fondo) 
            // Detectamos si el sistema está en modo oscuro para darle estilo al relleno del canvas
            const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const dialBackground = isDarkMode ? '#1e1e24' : '#fefefe';
            const markColor = isDarkMode ? '#e2e8f0' : '#2d3748';
            const numberColor = isDarkMode ? '#f1f5f9' : '#1e293b';
            const hourHandColor = isDarkMode ? '#facc15' : '#1e293b';
            const minuteHandColor = isDarkMode ? '#facc15' : '#334155';
            const secondHandColor = '#ef4444';   // rojo siempre visible
            
            ctx.fillStyle = dialBackground;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Borde sutil
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = isDarkMode ? 'rgba(255,255,240,0.2)' : 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // ----- DIBUJAR MARCAS DE HORAS (12 marcas principales) y números 12, 3, 6, 9 -----
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180; // -90° para que 0° sea las 12 en punto
                const outerX = centerX + (radius - 8) * Math.cos(angle);
                const outerY = centerY + (radius - 8) * Math.sin(angle);
                const innerX = centerX + (radius - 20) * Math.cos(angle);
                const innerY = centerY + (radius - 20) * Math.sin(angle);
                
                ctx.beginPath();
                ctx.moveTo(outerX, outerY);
                ctx.lineTo(innerX, innerY);
                ctx.lineWidth = 2.2;
                ctx.strokeStyle = markColor;
                ctx.stroke();
            }
            
            // Pequeñas marcas de minutos (opcional, solo cada 5 minutos ya tenemos las horas, pero agregamos sutiles puntos)
            for (let i = 0; i < 60; i++) {
                if (i % 5 === 0) continue; // ya están las horas
                const angle = (i * 6 - 90) * Math.PI / 180;
                const startX = centerX + (radius - 12) * Math.cos(angle);
                const startY = centerY + (radius - 12) * Math.sin(angle);
                const endX = centerX + (radius - 17) * Math.cos(angle);
                const endY = centerY + (radius - 17) * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.lineWidth = 1;
                ctx.strokeStyle = isDarkMode ? 'rgba(255,255,210,0.35)' : 'rgba(0,0,0,0.2)';
                ctx.stroke();
            }
            
            // Números principales (12, 3, 6, 9)
            const numbers = [
                { num: '12', angle: -90 },
                { num: '3', angle: 0 },
                { num: '6', angle: 90 },
                { num: '9', angle: 180 }
            ];
            ctx.font = `bold ${Math.floor(radius * 0.14)}px 'Inter', system-ui`;
            ctx.fillStyle = numberColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let n of numbers) {
                const rad = (n.angle * Math.PI) / 180;
                const x = centerX + (radius - 22) * Math.cos(rad);
                const y = centerY + (radius - 22) * Math.sin(rad);
                ctx.fillText(n.num, x, y);
            }
            
            // Opcional: agregar pequeños puntos en las posiciones de 1,2,4,5,7,8,10,11 (más estética)
            for (let i = 1; i <= 12; i++) {
                if ([12,3,6,9].includes(i)) continue;
                const angle = (i * 30 - 90) * Math.PI / 180;
                const x = centerX + (radius - 30) * Math.cos(angle);
                const y = centerY + (radius - 30) * Math.sin(angle);
                ctx.beginPath();
                ctx.fillStyle = isDarkMode ? '#cbd5e1' : '#475569';
                ctx.arc(x, y, 2.2, 0, 2 * Math.PI);
                ctx.fill();
            }
            
            // ---- DIBUJAR AGUJAS ----
            // Aguja de las horas
            const hourLen = radius * 0.48;
            const hourX = centerX + hourLen * Math.sin(hourAngle);
            const hourY = centerY - hourLen * Math.cos(hourAngle);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(hourX, hourY);
            ctx.lineWidth = 4.5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = hourHandColor;
            ctx.stroke();
            
            // Aguja de los minutos
            const minuteLen = radius * 0.68;
            const minuteX = centerX + minuteLen * Math.sin(minuteAngle);
            const minuteY = centerY - minuteLen * Math.cos(minuteAngle);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(minuteX, minuteY);
            ctx.lineWidth = 3.2;
            ctx.strokeStyle = minuteHandColor;
            ctx.stroke();
            
            // Aguja de los segundos (más fina y color rojo)
            const secondLen = radius * 0.78;
            const secondX = centerX + secondLen * Math.sin(secondAngle);
            const secondY = centerY - secondLen * Math.cos(secondAngle);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(secondX, secondY);
            ctx.lineWidth = 1.8;
            ctx.strokeStyle = secondHandColor;
            ctx.stroke();
            
            // Círculo central decorativo
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = secondHandColor;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 2.5, 0, 2 * Math.PI);
            ctx.fillStyle = isDarkMode ? '#f1f5f9' : '#0f172a';
            ctx.fill();
        }
        
        // ----- FUNCIÓN PARA ACTUALIZAR EL RELOJ DIGITAL Y LA FECHA (con formato 12/24h) -----
        function updateDigitalAndDate() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            let ampm = '';
            let displayHours;
            
            if (use24Hour) {
                // Formato 24h con leading zero
                displayHours = hours.toString().padStart(2, '0');
            } else {
                // Formato 12h
                ampm = hours >= 12 ? 'PM' : 'AM';
                let hour12 = hours % 12;
                hour12 = hour12 === 0 ? 12 : hour12;
                displayHours = hour12.toString().padStart(2, '0');
            }
            
            const minutesStr = minutes.toString().padStart(2, '0');
            const secondsStr = seconds.toString().padStart(2, '0');
            
            let timeString = `${displayHours}:${minutesStr}:${secondsStr}`;
            if (!use24Hour) timeString += ` ${ampm}`;
            
            digitalElement.textContent = timeString;
            
            // Actualizar fecha (formato legible)
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString(undefined, options);
            dateElement.textContent = dateString;
        }
        
        // ----- ACTUALIZACIÓN COMPLETA: reloj análogo + digital + fecha -----
        function updateFullClock() {
            drawAnalogClock();        // redibuja el canvas con la hora actual
            updateDigitalAndDate();   // actualiza el texto digital y fecha
        }
        
        // ----- TOGGLE 12h / 24h (con actualización inmediata)-----
        function toggleFormat() {
            use24Hour = !use24Hour;
            updateDigitalAndDate();   // solo cambia el formato digital, el análogo no necesita cambio
            // Efecto sutil en el botón (feedback)
            toggleBtn.style.transform = 'scale(0.96)';
            setTimeout(() => {
                if (toggleBtn) toggleBtn.style.transform = '';
            }, 120);
        }
        
        // ----- INICIALIZAR EL WIDGET Y SINCRONIZAR INTERVALOS -----
        function initClock() {
            // Primera ejecución inmediata
            updateFullClock();
            
            // Limpiar intervalos previos si existieran (por si se reinicia)
            if (intervalId) clearInterval(intervalId);
            // Actualizar cada segundo (1000ms)
            intervalId = setInterval(() => {
                updateFullClock();
            }, 1000);
            
            // Opcional: usar requestAnimationFrame para suavizar el canvas si quisieramos,
            // pero el canvas se redibuja junto con el intervalo, suficiente.
        }
        
        // Evento para el toggle de formato
        if (toggleBtn) {
            toggleBtn.addEventListener('click', toggleFormat);
        }
        
        // Observar cambios de tema (dark/light) para refrescar el canvas porque los colores dependen de prefers-color-scheme
        const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
        const handleThemeChange = () => {
            drawAnalogClock();   // solo redibujar el análogo para ajustar colores del dial y números
        };
        if (darkModeMedia.addEventListener) {
            darkModeMedia.addEventListener('change', handleThemeChange);
        } else if (darkModeMedia.addListener) {
            darkModeMedia.addListener(handleThemeChange);
        }
        
        // Ajustar el canvas por si el tamaño se ve afectado por algún zoom raro (forzamos redibujo)
        window.addEventListener('resize', () => {
            drawAnalogClock();   // mantiene integridad visual
        });
        
        // Lanzar el widget
        initClock();
        
        // Pequeña mejora: Asegurar que si la pestaña está inactiva, no haya degradado, pero setInterval funciona.
        // Además, garantizar que cuando la página se descargue, limpiar intervalo (buena práctica)
        window.addEventListener('beforeunload', () => {
            if (intervalId) clearInterval(intervalId);
        });
    })();
</script>
</body>
</html>
