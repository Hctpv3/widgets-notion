<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Notion Widget · Reloj integrado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 
          Fondo sólido que imita los colores reales de Notion.
          El iframe de Notion ignora 'transparent', pero respeta estos colores sólidos.
          Así el widget se funde visualmente sin bordes blancos.
        */
        body {
            background: #f7f7f7;  /* Color base de Notion en modo claro */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }

        /* Modo oscuro: Notion usa un fondo gris oscuro (#191919 aprox) */
        @media (prefers-color-scheme: dark) {
            body {
                background: #191919;
            }
        }

        /* 
          Contenedor principal: SIN fondo falso, SIN blur, SIN tarjeta blanca.
          Se integra completamente con el fondo de Notion.
          Solo añade un poco de espaciado y sombra sutil para dar jerarquía.
        */
        .clock-widget {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: transparent;   /* ← clave: nada de fondo extra */
            border-radius: 2rem;
            padding: 0.8rem 0.5rem 1.2rem 0.5rem;
            transition: all 0.2s;
        }

        /* Contenedor del canvas: centrado */
        .analog-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        canvas {
            width: 100%;
            max-width: 200px;
            height: auto;
            background: transparent;  /* El fondo del reloj lo dibujaremos con el color que combine */
            border-radius: 50%;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
        }

        /* Reloj digital: legible, sin cajas blancas */
        .digital-time {
            font-size: 2.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            font-family: 'Inter', 'JetBrains Mono', monospace;
            color: #1a2c3e;
            background: transparent;
            padding: 0.2rem 0;
            margin-bottom: 0.2rem;
        }

        /* Fecha */
        .date-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: #4b5563;
            background: transparent;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 0.9rem;
        }

        /* Botón de cambio de formato: estilo minimalista, sin fondo blanco intruso */
        .toggle-format {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.35rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            color: #2c3e50;
            font-family: inherit;
            transition: all 0.2s ease;
            backdrop-filter: none;
            box-shadow: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-format:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: scale(0.97);
        }

        /* Modo oscuro: colores claros sobre fondo oscuro */
        @media (prefers-color-scheme: dark) {
            .digital-time {
                color: #f0f3fa;
            }
            .date-text {
                color: #cbd5e6;
            }
            .toggle-format {
                background: rgba(255, 255, 255, 0.08);
                color: #e2e8f0;
            }
            .toggle-format:hover {
                background: rgba(255, 255, 255, 0.15);
            }
        }

        /* Footer sutil, casi transparente */
        .widget-footer {
            margin-top: 1rem;
            font-size: 0.65rem;
            opacity: 0.45;
            color: #5b6e8c;
        }

        @media (prefers-color-scheme: dark) {
            .widget-footer {
                color: #9aa9c1;
            }
        }

        /* Ajuste para móviles */
        @media (max-width: 450px) {
            .clock-widget {
                padding: 0.5rem;
            }
            .digital-time {
                font-size: 2rem;
            }
            canvas {
                max-width: 170px;
            }
        }
    </style>
</head>
<body>
<div class="clock-widget">
    <!-- Reloj analógico (canvas) -->
    <div class="analog-container">
        <canvas id="analogCanvas" width="200" height="200" style="width:100%; height:auto; max-width:200px; aspect-ratio:1/1">
            Tu navegador no soporta canvas.
        </canvas>
    </div>

    <!-- Reloj digital + fecha + selector de formato -->
    <div class="digital-time" id="digitalClock">--:--:--</div>
    <div class="date-text" id="dateDisplay"></div>
    <div>
        <button class="toggle-format" id="toggleFormatBtn">🕒 12h / 24h</button>
    </div>
    <div class="widget-footer">⏱️ integrado con Notion</div>
</div>

<script>
    (function() {
        // Elementos del DOM
        const canvas = document.getElementById('analogCanvas');
        const ctx = canvas.getContext('2d');
        const digitalElement = document.getElementById('digitalClock');
        const dateElement = document.getElementById('dateDisplay');
        const toggleBtn = document.getElementById('toggleFormatBtn');

        // Configuración
        let use24Hour = false;     // false = 12h con AM/PM
        let intervalId = null;

        // Dimensiones fijas del canvas (200x200)
        const size = 200;
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = 86;         // radio del círculo del reloj

        // Función que obtiene el color de fondo según el tema del sistema
        function getThemeBackground() {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            return isDark ? '#1e1e24' : '#fefefe';
        }

        // Colores de trazos según tema
        function getColors() {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            return {
                markColor: isDark ? '#cdd9f4' : '#2c3e50',
                numberColor: isDark ? '#eef2ff' : '#1e293b',
                hourHandColor: isDark ? '#facc15' : '#1f2a44',
                minuteHandColor: isDark ? '#fbbf24' : '#334155',
                secondHandColor: '#f97316',   // naranja vivo
                dialBg: isDark ? '#1e1e24' : '#fefefe'
            };
        }

        // Dibujar el reloj análogo completo
        function drawAnalogClock() {
            if (!ctx) return;
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const hourForHand = hours % 12;
            // Ángulos (en radianes, 0° = 12 en punto)
            const hourAngle = ((hourForHand + minutes / 60) * 30) * Math.PI / 180;
            const minuteAngle = (minutes * 6) * Math.PI / 180;
            const secondAngle = (seconds * 6) * Math.PI / 180;

            const colors = getColors();
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            // Limpiar canvas con fondo completamente transparente (para que herede el body)
            ctx.clearRect(0, 0, size, size);
            
            // Dibujar fondo de la esfera (consistente con el tema, pero sin bordes blancos)
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = colors.dialBg;
            ctx.fill();
            // Borde muy sutil
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = isDark ? 'rgba(255,255,240,0.2)' : 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // Marcas de las horas (12 principales)
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                const outerX = centerX + (radius - 6) * Math.cos(angle);
                const outerY = centerY + (radius - 6) * Math.sin(angle);
                const innerX = centerX + (radius - 18) * Math.cos(angle);
                const innerY = centerY + (radius - 18) * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(outerX, outerY);
                ctx.lineTo(innerX, innerY);
                ctx.lineWidth = 2.2;
                ctx.strokeStyle = colors.markColor;
                ctx.stroke();
            }

            // Marcas de minutos (más finas, cada minuto)
            for (let i = 0; i < 60; i++) {
                if (i % 5 === 0) continue;
                const angle = (i * 6 - 90) * Math.PI / 180;
                const startX = centerX + (radius - 9) * Math.cos(angle);
                const startY = centerY + (radius - 9) * Math.sin(angle);
                const endX = centerX + (radius - 15) * Math.cos(angle);
                const endY = centerY + (radius - 15) * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.lineWidth = 1;
                ctx.strokeStyle = isDark ? 'rgba(210, 225, 255, 0.3)' : 'rgba(0,0,0,0.18)';
                ctx.stroke();
            }

            // Números 12, 3, 6, 9
            const numbers = [
                { num: '12', angle: -90 },
                { num: '3', angle: 0 },
                { num: '6', angle: 90 },
                { num: '9', angle: 180 }
            ];
            ctx.font = `bold ${Math.floor(radius * 0.14)}px 'Inter', system-ui`;
            ctx.fillStyle = colors.numberColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let n of numbers) {
                const rad = (n.angle * Math.PI) / 180;
                const x = centerX + (radius - 22) * Math.cos(rad);
                const y = centerY + (radius - 22) * Math.sin(rad);
                ctx.fillText(n.num, x, y);
            }

            // Pequeños puntos en las otras horas (estético)
            for (let i = 1; i <= 12; i++) {
                if ([12, 3, 6, 9].includes(i)) continue;
                const angle = (i * 30 - 90) * Math.PI / 180;
                const x = centerX + (radius - 28) * Math.cos(angle);
                const y = centerY + (radius - 28) * Math.sin(angle);
                ctx.beginPath();
                ctx.fillStyle = isDark ? '#a0b3d9' : '#5b6e8c';
                ctx.arc(x, y, 2, 0, 2 * Math.PI);
                ctx.fill();
            }

            // --- Aguja de horas ---
            const hourLen = radius * 0.48;
            const hourX = centerX + hourLen * Math.sin(hourAngle);
            const hourY = centerY - hourLen * Math.cos(hourAngle);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(hourX, hourY);
            ctx.lineWidth = 4.2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colors.hourHandColor;
            ctx.stroke();

            // --- Aguja de minutos ---
            const minuteLen = radius * 0.66;
            const minuteX = centerX + minuteLen * Math.sin(minuteAngle);
            const minuteY = centerY - minuteLen * Math.cos(minuteAngle);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(minuteX, minuteY);
            ctx.lineWidth = 3;
            ctx.strokeStyle = colors.minuteHandColor;
            ctx.stroke();

            // --- Aguja de segundos ---
            const secondLen = radius * 0.75;
            const secondX = centerX + secondLen * Math.sin(secondAngle);
            const secondY = centerY - secondLen * Math.cos(secondAngle);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(secondX, secondY);
            ctx.lineWidth = 1.6;
            ctx.strokeStyle = colors.secondHandColor;
            ctx.stroke();

            // Centro decorativo
            ctx.beginPath();
            ctx.arc(centerX, centerY, 4.5, 0, 2 * Math.PI);
            ctx.fillStyle = colors.secondHandColor;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 2.2, 0, 2 * Math.PI);
            ctx.fillStyle = isDark ? '#ffffff' : '#1a2c3e';
            ctx.fill();
        }

        // Actualizar reloj digital y fecha
        function updateDigitalAndDate() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            let displayHours;
            let ampm = '';

            if (use24Hour) {
                displayHours = hours.toString().padStart(2, '0');
            } else {
                ampm = hours >= 12 ? 'PM' : 'AM';
                let hour12 = hours % 12;
                hour12 = hour12 === 0 ? 12 : hour12;
                displayHours = hour12.toString().padStart(2, '0');
            }

            const minutesStr = minutes.toString().padStart(2, '0');
            const secondsStr = seconds.toString().padStart(2, '0');
            let timeString = `${displayHours}:${minutesStr}:${secondsStr}`;
            if (!use24Hour) timeString += ` ${ampm}`;

            digitalElement.textContent = timeString;

            // Fecha con formato limpio
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateElement.textContent = now.toLocaleDateString(undefined, options);
        }

        // Actualización completa: reloj análogo + digital + fecha
        function updateFullClock() {
            drawAnalogClock();
            updateDigitalAndDate();
        }

        // Alternar formato 12/24h
        function toggleFormat() {
            use24Hour = !use24Hour;
            updateDigitalAndDate();  // solo cambia la parte digital
            // Pequeña animación en el botón
            toggleBtn.style.transform = 'scale(0.96)';
            setTimeout(() => {
                if (toggleBtn) toggleBtn.style.transform = '';
            }, 120);
        }

        // Inicializar el widget con intervalo de 1 segundo
        function init() {
            updateFullClock();
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(updateFullClock, 1000);

            // Escuchar cambios de tema claro/oscuro para redibujar el canvas con los colores correctos
            const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
            const themeListener = () => drawAnalogClock();
            if (darkModeMedia.addEventListener) {
                darkModeMedia.addEventListener('change', themeListener);
            } else if (darkModeMedia.addListener) {
                darkModeMedia.addListener(themeListener);
            }

            // Al redimensionar, el canvas se ve bien, pero forzamos redibujo por si acaso
            window.addEventListener('resize', () => drawAnalogClock());
        }

        // Asignar evento al botón
        if (toggleBtn) {
            toggleBtn.addEventListener('click', toggleFormat);
        }

        // Arrancar todo
        init();

        // Limpiar intervalo al cerrar la página (buena práctica)
        window.addEventListener('beforeunload', () => {
            if (intervalId) clearInterval(intervalId);
        });
    })();
</script>
</body>
</html>
